   ============================================================ */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function committeeName(id, custom) {
  if (id === "other" && custom) return custom;
  const c = COMMITTEES.find(c => c.id === id);
  return c ? c.name : "—";
}
function committeeShort(id) {
  const c = COMMITTEES.find(c => c.id === id);
  return c ? c.short : "—";
}
function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getDate()} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtDateShort(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}
function isSameMonth(iso, ref) {
  const d = new Date(iso);
  return d.getFullYear() === ref.getFullYear() && d.getMonth() === ref.getMonth();
}
function todayInput() {
  return new Date().toISOString().slice(0, 10);
}
function getInitials(name) {
  if (!name) return "م";
  const parts = name.split(" ");
  if (parts.length >= 2) return parts[0][0] + parts[1][0];
  return name.slice(0, 2);
}
function generateReportId() {
  return "RPT-" + Date.now().toString(36).toUpperCase();
}

const SUPABASE_URL = "https://falypezlnmnrurinpsiw.supabase.co";
const SUPABASE_KEY = "sb_publishable_iZaB4y72Yi97MJKevYHXtA_IcqnBWF4";
const SESSION_KEY = "majalis-lijan-session";
let currentSession = null;
try {
  currentSession = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
} catch (e) {
  currentSession = null;
}

function getAccessToken() {
  return currentSession ? currentSession.accessToken : null;
}

function setSession(s) {
  currentSession = s;
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify(s));
  } catch (e) {}
}

function clearSession() {
  currentSession = null;
  try {
    localStorage.removeItem(SESSION_KEY);
  } catch (e) {}
}

async function refreshSession() {
  if (!currentSession || !currentSession.refreshToken) throw new Error("no session");
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      refresh_token: currentSession.refreshToken
    })
  });
  if (!res.ok) throw new Error("refresh failed");
  const body = await res.json();
  setSession(Object.assign({}, currentSession, {
    accessToken: body.access_token,
    refreshToken: body.refresh_token
  }));
  return body.access_token;
}

async function sb(path, options) {
  options = options || {};
  const token = getAccessToken() || SUPABASE_KEY;
  const headers = Object.assign({
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + token,
    "Content-Type": "application/json"
  }, options.headers || {});
  let res = await fetch(SUPABASE_URL + "/rest/v1/" + path, Object.assign({}, options, {
    headers: headers
  }));
  if (res.status === 401 && currentSession) {
    try {
      const newToken = await refreshSession();
      const retryHeaders = Object.assign({}, headers, {
        Authorization: "Bearer " + newToken
      });
      res = await fetch(SUPABASE_URL + "/rest/v1/" + path, Object.assign({}, options, {
        headers: retryHeaders
      }));
    } catch (e) {
      clearSession();
      throw new Error("انتهت الجلسة، يرجى تسجيل الدخول من جديد");
    }
  }
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error("supabase " + res.status + ": " + text);
  }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function sectionForTitle(title) {
  if (title.includes("مدير") || title.includes("مساعد")) return "القيادة";
  if (title.includes("مالي")) return "الشؤون المالية";
  if (title.includes("مجالس") || title.includes("لجان")) return "المجالس واللجان";
  if (title.includes("دراس")) return "قسم الدراسات";
  if (title.includes("تنسيق") || title.includes("متابعة")) return "قسم التنسيق والمتابعة";
  return "أخرى";
}

async function authLogin(employeeNumber, password) {
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: employeeEmail(employeeNumber),
      password: password
    })
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error("الرقم الوظيفي أو رمز الدخول غير صحيح.");
  }
  const rows = await sb("employees?id=eq." + body.user.id + "&select=*", {
    headers: {
      Authorization: "Bearer " + body.access_token
    }
  });
  const employeeRow = rows && rows[0];
  if (!employeeRow) throw new Error("لم يتم العثور على بيانات الموظف.");
  const employee = employeeFromRow(employeeRow);
  setSession({
    accessToken: body.access_token,
    refreshToken: body.refresh_token,
    employee: employee
  });
  await sb("employees?id=eq." + employee.id, {
    method: "PATCH",
    headers: { Prefer: "return=minimal" },
    body: JSON.stringify({ last_login: new Date().toISOString() })
  }).catch(() => {});
  return employee;
}

function authLogout() {
  clearSession();
}

async function authChangePassword(employeeNumber, oldPassword, newPassword) {
  const verifyRes = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: employeeEmail(employeeNumber),
      password: oldPassword
    })
  });
  if (!verifyRes.ok) throw new Error("رمز الدخول الحالي غير صحيح.");
  const verifyBody = await verifyRes.json();
  const res = await fetch(SUPABASE_URL + "/auth/v1/user", {
    method: "PUT",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + verifyBody.access_token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      password: newPassword
    })
  });
  if (!res.ok) throw new Error("تعذّر تغيير رمز الدخول.");
  setSession(Object.assign({}, currentSession, {
    accessToken: verifyBody.access_token,
    refreshToken: verifyBody.refresh_token
  }));
}

const ATTACHMENTS_BUCKET = "topic-attachments";
const ALLOWED_ATTACHMENT_EXT = [".pdf", ".doc", ".docx", ".xls", ".xlsx"];
const MAX_ATTACHMENT_SIZE = 50 * 1024 * 1024;

function humanFileSize(bytes) {
  if (!bytes) return "٠ KB";
  const kb = bytes / 1024;
  if (kb < 1024) return Math.round(kb) + " KB";
  return (kb / 1024).toFixed(1) + " MB";
}

async function uploadAttachment(file, pathPrefix) {
  const token = getAccessToken() || SUPABASE_KEY;
  const safeName = file.name.replace(/[^\w.\-\u0600-\u06FF ]/g, "_");
  const path = pathPrefix + "/" + Date.now() + "-" + safeName;
  const res = await fetch(SUPABASE_URL + "/storage/v1/object/" + ATTACHMENTS_BUCKET + "/" + encodeURIComponent(path), {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + token,
      "Content-Type": file.type || "application/octet-stream"
    },
    body: file
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error("upload failed " + res.status + ": " + text);
  }
  return {
    name: file.name,
    path: path,
    size: file.size,
    type: file.type,
    uploadedAt: new Date().toISOString()
  };
}

async function deleteAttachment(path) {
  const token = getAccessToken() || SUPABASE_KEY;
  await fetch(SUPABASE_URL + "/storage/v1/object/" + ATTACHMENTS_BUCKET + "/" + encodeURIComponent(path), {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + token
    }
  });
}

function attachmentUrl(path) {
  return SUPABASE_URL + "/storage/v1/object/public/" + ATTACHMENTS_BUCKET + "/" + path;
}
