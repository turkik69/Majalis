function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function committeeName(id, custom) {
  if (id === "other" && custom) return custom;
  const c = COMMITTEES.find(c => c.id === id);
  return c ? c.name : "—";
}
function committeeShort(id) {
  const c = COMMITTEES.find(c => c.id === id);
  return c ? c.short : "—";
}
function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getDate()} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function isSameMonth(iso, ref) {
  const d = new Date(iso);
  return d.getFullYear() === ref.getFullYear() && d.getMonth() === ref.getMonth();
}
function todayInput() {
  return new Date().toISOString().slice(0, 10);
}

const SUPABASE_URL = "https://falypezlnmnrurinpsiw.supabase.co";
const SUPABASE_KEY = "sb_publishable_iZaB4y72Yi97MJKevYHXtA_IcqnBWF4";
const SESSION_KEY = "majalis-lijan-session";
let currentSession = null;
try {
  currentSession = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
} catch (e) {
  currentSession = null;
}
function getAccessToken() {
  return currentSession ? currentSession.accessToken : null;
}
function setSession(s) {
  currentSession = s;
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify(s));
  } catch (e) {}
}
function clearSession() {
  currentSession = null;
  try {
    localStorage.removeItem(SESSION_KEY);
  } catch (e) {}
}
async function refreshSession() {
  if (!currentSession || !currentSession.refreshToken) throw new Error("no session");
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      refresh_token: currentSession.refreshToken
    })
  });
  if (!res.ok) throw new Error("refresh failed");
  const body = await res.json();
  setSession(Object.assign({}, currentSession, {
    accessToken: body.access_token,
    refreshToken: body.refresh_token
  }));
  return body.access_token;
}
async function sb(path, options) {
  options = options || {};
  const token = getAccessToken() || SUPABASE_KEY;
  const headers = Object.assign({
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + token,
    "Content-Type": "application/json"
  }, options.headers || {});
  let res = await fetch(SUPABASE_URL + "/rest/v1/" + path, Object.assign({}, options, {
    headers: headers
  }));
  if (res.status === 401 && currentSession) {
    try {
      const newToken = await refreshSession();
      const retryHeaders = Object.assign({}, headers, {
        Authorization: "Bearer " + newToken
      });
      res = await fetch(SUPABASE_URL + "/rest/v1/" + path, Object.assign({}, options, {
        headers: retryHeaders
      }));
    } catch (e) {
      clearSession();
      throw new Error("انتهت الجلسة، يرجى تسجيل الدخول من جديد");
    }
  }
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error("supabase " + res.status + ": " + text);
  }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function toRow(obj, map) {
  const row = {};
  Object.keys(obj).forEach(k => {
    if (map[k] !== undefined) row[map[k]] = obj[k];
  });
  return row;
}
function topicFromRow(row) {
  return {
    id: row.id,
    title: row.title,
    committeeId: row.committee_id,
    customCommittee: row.custom_committee || "",
    responsibleRole: row.responsible_role,
    status: row.status,
    description: row.description || "",
    attachments: row.attachments || [],
    createdAt: row.created_at
  };
}
function movementFromRow(row) {
  return {

async function fetchAllData() {
  const [topicRows, movementRows, employeeRows] = await Promise.all([sb("topics?select=*&order=created_at.desc"), sb("movements?select=*&order=date.desc"), sb("employees?select=*&order=employee_number.asc")]);
  return {
    topics: topicRows.map(topicFromRow),
    movements: movementRows.map(movementFromRow),
    employees: employeeRows.map(employeeFromRow)
  };
}
async function insertTopic(payload) {
  const rows = await sb("topics", {

async function authLogin(employeeNumber, password) {
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: employeeEmail(employeeNumber),
      password: password
    })

  }
  const rows = await sb("employees?id=eq." + body.user.id + "&select=*", {
    headers: {
      Authorization: "Bearer " + body.access_token
    }
  });
  const employeeRow = rows && rows[0];
