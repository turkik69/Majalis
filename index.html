const SB_URL = "https://falypezlnmnrurinpsiw.supabase.co";
const SB_KEY = "sb_publishable_iZaB4y72Yi97MJKevYHXtA_IcqnBWF4";
const SESSION_KEY = "majalis-lijan-session";
let currentSession = null;
try { currentSession = JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch(e) { currentSession = null; }

const getToken = () => currentSession?.accessToken || null;
const setSession = (s) => { currentSession = s; try { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); } catch(e) {} };
const clearSession = () => { currentSession = null; try { localStorage.removeItem(SESSION_KEY); } catch(e) {} };

const refreshSession = async () => {
  if (!currentSession?.refreshToken) throw new Error("no session");
  const res = await fetch(SB_URL + "/auth/v1/token?grant_type=refresh_token", {
    method: "POST",
    headers: { apikey: SB_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ refresh_token: currentSession.refreshToken })
  });
  if (!res.ok) throw new Error("refresh failed");
  const body = await res.json();
  setSession({ ...currentSession, accessToken: body.access_token, refreshToken: body.refresh_token });
  return body.access_token;
};

const sb = async (path, options = {}) => {
  const token = getToken() || SB_KEY;
  const headers = { apikey: SB_KEY, Authorization: "Bearer " + token, "Content-Type": "application/json", ...options.headers };
  let res = await fetch(SB_URL + "/rest/v1/" + path, { ...options, headers });
  if (res.status === 401 && currentSession) {
    try {
      const newToken = await refreshSession();
      const retryHeaders = { ...headers, Authorization: "Bearer " + newToken };
      res = await fetch(SB_URL + "/rest/v1/" + path, { ...options, headers: retryHeaders });
    } catch(e) { clearSession(); throw new Error("انتهت الجلسة، يرجى تسجيل الدخول من جديد"); }
  }
  if (!res.ok) { const text = await res.text().catch(() => ""); throw new Error("supabase " + res.status + ": " + text); }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

// ===== التطبيق الرئيسي =====
function App() {
  const [employee, setEmployee] = useState(null);
  const [employees, setEmployees] = useState([]);
  const [view, setView] = useState("dashboard");
  const [data, setData] = useState({ topics: [], movements: [] });
  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState(false);
  const [toast, setToast] = useState(null);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [changePasswordOpen, setChangePasswordOpen] = useState(false);
  const refreshTimer = useRef(null);

  const showToast = (type, message) => setToast({ type, message });

  const refresh = async () => {
    try {
      const fresh = await fetchAllData();
      setData({ topics: fresh.topics, movements: fresh.movements });
      setEmployees(fresh.employees);
      setLoadError(false);
    } catch(e) { console.error(e); setLoadError(true); } finally { setLoading(false); }
  };

  useEffect(() => {
    if (!employee) return;
    setLoading(true); refresh();
    refreshTimer.current = setInterval(refresh, 30000);
    const onFocus = () => { refresh(); };
    window.addEventListener("focus", onFocus);
    return () => { clearInterval(refreshTimer.current); window.removeEventListener("focus", onFocus); };
  }, [employee]);

  const handleLogin = async (num, pass) => {
    const emp = await authLogin(num, pass);
    setEmployee(emp);
    showToast("success", "مرحباً بك " + emp.fullName);
  };

  const handleLogout = () => { authLogout(); setEmployee(null); setData({ topics: [], movements: [] }); setEmployees([]); setView("dashboard"); showToast("success", "تم تسجيل الخروج"); };

  const handlePromote = async (num, makeAdmin) => {
    try { await rpcSetAdmin(num, makeAdmin); await refresh(); showToast("success", makeAdmin ? "تم منح صلاحية المشرف." : "تم إلغاء صلاحية المشرف."); } catch(e) { showToast("error", "تعذّر تنفيذ العملية."); }
  };
  const handleResetPassword = async (num) => {
    try { await rpcResetPassword(num); showToast("success", "تمت إعادة تعيين رمز الدخول إلى 1234."); } catch(e) { showToast("error", "تعذّر تنفيذ العملية."); }
  };

  const addTopic = async (payload) => {
    try { const t = await insertTopic(payload); setData(d => ({ ...d, topics: [t, ...d.topics] })); showToast("success", "تم إضافة الموضوع بنجاح."); } catch(e) { showToast("error", "تعذّرت إضافة الموضوع."); }
  };
  const updateTopic = async (id, patch) => {
    try { const t = await patchTopic(id, patch); setData(d => ({ ...d, topics: d.topics.map(x => x.id === id ? t : x) })); showToast("success", "تم حفظ التعديلات."); } catch(e) { showToast("error", "تعذّر حفظ التعديل."); }
  };
  const addMovement = async (payload) => {
    try { const m = await insertMovement(payload); setData(d => ({ ...d, movements: [m, ...d.movements] })); showToast("success", "تم إضافة الحركة بنجاح."); } catch(e) { showToast("error", "تعذّرت إضافة الحركة."); }
  };
  const deleteMovement = async (id) => {
    try { await deleteMovement(id); setData(d => ({ ...d, movements: d.movements.filter(m => m.id !== id) })); showToast("success", "تم حذف الحركة."); } catch(e) { showToast("error", "تعذّر حذف الحركة."); }
  };

  if (!employee) return React.createElement(LoginScreen, { onLogin: handleLogin });

  if (loading) return React.createElement("div", { dir: "rtl", className: "min-h-screen flex items-center justify-center", style: { background: C.paper, fontFamily: "'Cairo', sans-serif" } },
    React.createElement("div", { className: "flex items-center gap-3" },
      React.createElement("div", { className: "w-10 h-10 rounded-full bg-red-700 flex items-center justify-center text-white font-bold" }, "D"),
      React.createElement("span", { className: "text-sm font-semibold", style: { color: C.navy800 } }, "جارِ الاتصال بقاعدة البيانات...")
    )
  );

  if (loadError) return React.createElement("div", { dir: "rtl", className: "min-h-screen flex items-center justify-center p-6", style: { background: C.paper, fontFamily: "'Cairo', sans-serif" } },
    React.createElement("div", { className: "text-center max-w-sm" },
      React.createElement("p", { className: "font-bold text-sm", style: { color: C.navy950 } }, "تعذّر الاتصال بقاعدة البيانات"),
      React.createElement("p", { className: "mt-1.5 text-xs", style: { color: C.slate } }, "تحقق من اتصالك بالإنترنت ثم أعد المحاولة."),
      React.createElement("button", { onClick: refresh, className: "mt-4 px-4 py-2 rounded-lg text-sm font-bold text-white", style: { background: C.navy950 } }, "إعادة المحاولة")
    )
  );

  return React.createElement("div", { dir: "rtl", className: "min-h-screen flex", style: { background: C.paper, fontFamily: "'Cairo', sans-serif", color: C.ink } },
    React.createElement("style", null, `.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; } .animate-in { animation: slideIn 0.3s ease-out; } @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }`),
    toast && React.createElement(Toast, { message: toast.message, type: toast.type, onClose: () => setToast(null) }),
    React.createElement(Sidebar, { view, setView, onReset: refresh, mobileOpen, setMobileOpen, employee, onLogout: handleLogout, onChangePassword: () => setChangePasswordOpen(true) }),
    React.createElement("main", { className: "flex-1 min-w-0 p-4 md:p-8" },
      view === "dashboard" && React.createElement(DashboardView, { data }),
      view === "topics" && React.createElement(TopicsView, { data, employees, currentEmployeeName: employee.fullName, onAddTopic: addTopic, onUpdateTopic: updateTopic, onAddMovement: addMovement, onDeleteMovement: deleteMovement }),
      view === "movements" && React.createElement(MovementsView, { data, employees, currentEmployeeName: employee.fullName, onAddMovement: addMovement, onDeleteMovement: deleteMovement }),
      view === "entities" && React.createElement(EntitiesView, { data }),
      view === "committees" && React.createElement(CommitteesView, { data }),
      view === "team" && React.createElement(TeamView, { employees, currentEmployee: employee, onPromote: handlePromote, onResetPassword: handleResetPassword })
    ),
    changePasswordOpen && React.createElement(ChangePasswordModal, { employeeNumber: employee.employeeNumber, onClose: () => setChangePasswordOpen(false), onChanged: () => { setChangePasswordOpen(false); showToast("success", "تم تغيير رمز الدخول بنجاح."); } })
  );
}

// ===== نافذة تغيير كلمة المرور =====
function ChangePasswordModal({ employeeNumber, onClose, onChanged }) {
  const [oldPass, setOldPass] = useState("");
  const [newPass, setNewPass] = useState("");
  const [confirmPass, setConfirmPass] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const handleSave = async () => {
    if (!oldPass || !newPass) { setError("يرجى تعبئة جميع الحقول."); return; }
    if (newPass.length < 4) { setError("رمز الدخول الجديد قصير جدًا."); return; }
    if (newPass !== confirmPass) { setError("رمز الدخول الجديد غير متطابق."); return; }
    setBusy(true); setError("");
    try { await authChangePassword(employeeNumber, oldPass, newPass); onChanged(); } catch(e) { setError(e.message || "تعذّر تغيير رمز الدخول."); } finally { setBusy(false); }
  };

  return React.createElement(Modal, { title: "تغيير رمز الدخول", onClose },
    React.createElement(Field, { label: "رمز الدخول الحالي" },
      React.createElement("input", { type: "password", className: inputClass, style: inputStyle, value: oldPass, onChange: e => setOldPass(e.target.value) })
    ),
    React.createElement(Field, { label: "رمز الدخول الجديد" },
      React.createElement("input", { type: "password", className: inputClass, style: inputStyle, value: newPass, onChange: e => setNewPass(e.target.value) })
    ),
    React.createElement(Field, { label: "تأكيد رمز الدخول الجديد" },
      React.createElement("input", { type: "password", className: inputClass, style: inputStyle, value: confirmPass, onChange: e => setConfirmPass(e.target.value) })
    ),
    error && React.createElement("p", { className: "text-xs text-red-600 mb-3" }, error),
    React.createElement("div", { className: "flex gap-2 justify-end mt-2" },
      React.createElement("button", { onClick: onClose, className: "px-4 py-2 rounded-lg text-sm font-semibold", style: { color: C.slate } }, "إلغاء"),
      React.createElement("button", { onClick: handleSave, disabled: busy, className: "px-4 py-2 rounded-lg text-sm font-bold text-white disabled:opacity-60 flex items-center gap-2", style: { background: C.navy950 } },
        busy && React.createElement(I.RefreshCw, { size: 16, className: "animate-spin" }),
        busy ? "جارِ الحفظ..." : "حفظ"
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
